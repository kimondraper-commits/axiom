<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Hex background (pointy-top, r=15) -->
  <polygon points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5"
    fill="#1a3828" stroke="#4a7a5e" stroke-width="1.2"/>
  <!-- Inner hex ring -->
  <polygon points="16,5 26,10.5 26,21.5 16,27 6,21.5 6,10.5"
    fill="none" stroke="#4a7a5e" stroke-width="0.5" opacity="0.3"/>
  <!-- Column capital -->
  <rect x="11" y="9" width="10" height="2.5" rx="0.4" fill="#f5f0e8" opacity="0.9"/>
  <!-- Column shaft -->
  <rect x="13" y="11.5" width="6" height="10" rx="0.5" fill="#f5f0e8" opacity="0.85"/>
  <!-- Flutes -->
  <line x1="14.5" y1="11.5" x2="14.5" y2="21.5" stroke="#0b1a2a" stroke-width="0.6" opacity="0.2"/>
  <line x1="16" y1="11.5" x2="16" y2="21.5" stroke="#0b1a2a" stroke-width="0.6" opacity="0.2"/>
  <line x1="17.5" y1="11.5" x2="17.5" y2="21.5" stroke="#0b1a2a" stroke-width="0.6" opacity="0.2"/>
  <!-- Circuit lines (green) -->
  <line x1="13.5" y1="15" x2="18.5" y2="15" stroke="#6b9e7a" stroke-width="0.8" opacity="0.7"/>
  <line x1="13.5" y1="18.5" x2="18.5" y2="18.5" stroke="#6b9e7a" stroke-width="0.8" opacity="0.7"/>
  <!-- Column base -->
  <rect x="11" y="21.5" width="10" height="2.5" rx="0.4" fill="#f5f0e8" opacity="0.9"/>
  <!-- Mini wreath hints -->
  <ellipse cx="9" cy="16" rx="3" ry="1.3" transform="rotate(10 9 16)" fill="#4a7a5e" opacity="0.35"/>
  <ellipse cx="9" cy="11" rx="2.5" ry="1.1" transform="rotate(25 9 11)" fill="#4a7a5e" opacity="0.3"/>
  <ellipse cx="23" cy="16" rx="3" ry="1.3" transform="rotate(-10 23 16)" fill="#4a7a5e" opacity="0.35"/>
  <ellipse cx="23" cy="11" rx="2.5" ry="1.1" transform="rotate(-25 23 11)" fill="#4a7a5e" opacity="0.3"/>
</svg>
